version: '3.8'

services:
  web:
    build: .
    container_name: luckyhouse
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/zh"]
      interval: 30s
      timeout: 5s
      retries: 3
